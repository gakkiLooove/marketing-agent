<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>营销 Agent 工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="营销 Agent 输入面板">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" role="img">
              <path d="M6 21.5V10.7c0-.9.8-1.6 1.7-1.4l17.1 3.8c.7.1 1.2.8 1.2 1.5v2.8c0 .7-.5 1.3-1.2 1.5L7.7 23c-.9.2-1.7-.5-1.7-1.5Z" />
              <path d="M11.5 22.2 14.2 28h4l-3.4-7" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Agent Create</p>
            <h1>营销 Agent</h1>
          </div>
        </div>

        <form id="agentForm" class="agent-form">
          <label>
            产品或服务
            <input id="product" name="product" type="text" value="AI 销售线索管理工具" />
          </label>

          <label>
            目标客户
            <input id="audience" name="audience" type="text" value="20-80 人的 B2B 创业团队" />
          </label>

          <label>
            核心卖点
            <textarea id="valueProp" name="valueProp" rows="3">自动整理线索、识别高意向客户、生成跟进建议，帮助销售团队减少手工记录时间。</textarea>
          </label>

          <label>
            营销目标
            <select id="goal" name="goal">
              <option value="leads">获取销售线索</option>
              <option value="launch">新品发布</option>
              <option value="retention">提升复购/留存</option>
              <option value="awareness">提升品牌认知</option>
            </select>
          </label>

          <div class="form-grid">
            <label>
              主要渠道
              <select id="channel" name="channel">
                <option value="social">社媒内容</option>
                <option value="search">搜索广告</option>
                <option value="email">邮件营销</option>
                <option value="community">社群运营</option>
                <option value="webinar">直播/研讨会</option>
              </select>
            </label>
            <label>
              文案语气
              <select id="tone" name="tone">
                <option value="professional">专业可信</option>
                <option value="direct">直接转化</option>
                <option value="warm">亲和顾问</option>
                <option value="bold">强势增长</option>
              </select>
            </label>
          </div>

          <div class="form-grid">
            <label>
              周预算
              <input id="budget" name="budget" type="number" min="0" step="100" value="5000" />
            </label>
            <label>
              周期
              <select id="timeline" name="timeline">
                <option value="7">7 天</option>
                <option value="14">14 天</option>
                <option value="30">30 天</option>
              </select>
            </label>
          </div>

          <button class="primary-action" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 12 4 4L19 6" />
            </svg>
            生成方案
          </button>
        </form>
      </aside>

      <main class="workspace">
        <section class="topbar" aria-label="方案概览">
          <div>
            <p class="eyebrow">Marketing Intelligence</p>
            <h2 id="briefTitle">AI 销售线索管理工具增长方案</h2>
          </div>
          <div class="topbar-actions">
            <button id="copySummary" class="icon-button" type="button" aria-label="复制摘要" title="复制摘要">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 8h10v12H8z" />
                <path d="M6 16H4V4h10v2" />
              </svg>
            </button>
            <button id="resetForm" class="icon-button" type="button" aria-label="重置输入" title="重置输入">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 4v6h6" />
                <path d="M20 11a8 8 0 1 0-2.3 5.7" />
              </svg>
            </button>
          </div>
        </section>

        <section class="metrics-grid" aria-label="关键建议指标">
          <article class="metric-panel">
            <span class="metric-label">主诉求</span>
            <strong id="primaryMessage">减少销售手工记录，把高意向客户优先推给团队。</strong>
          </article>
          <article class="metric-panel">
            <span class="metric-label">优先渠道</span>
            <strong id="channelFocus">社媒内容 + 再营销</strong>
          </article>
          <article class="metric-panel">
            <span class="metric-label">预算节奏</span>
            <strong id="budgetSplit">测试 60% / 放量 40%</strong>
          </article>
        </section>

        <nav class="tabs" aria-label="方案视图">
          <button class="tab-button active" type="button" data-tab="strategy">策略</button>
          <button class="tab-button" type="button" data-tab="persona">受众</button>
          <button class="tab-button" type="button" data-tab="copy">文案</button>
          <button class="tab-button" type="button" data-tab="calendar">日历</button>
        </nav>

        <section class="tab-panels">
          <div id="strategy" class="tab-panel active">
            <div class="panel-grid">
              <article class="content-card wide">
                <div class="section-heading">
                  <h3>定位与路径</h3>
                  <button class="mini-copy" type="button" data-copy-target="positioning" aria-label="复制定位与路径">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M8 8h10v12H8z" />
                      <path d="M6 16H4V4h10v2" />
                    </svg>
                  </button>
                </div>
                <div id="positioning" class="rich-output"></div>
              </article>
              <article class="content-card">
                <h3>渠道组合</h3>
                <div id="channelPlan" class="stack-list"></div>
              </article>
              <article class="content-card">
                <h3>转化漏斗</h3>
                <div id="funnelPlan" class="funnel-list"></div>
              </article>
            </div>
          </div>

          <div id="persona" class="tab-panel">
            <div id="personaCards" class="persona-grid"></div>
          </div>

          <div id="copy" class="tab-panel">
            <div class="panel-grid">
              <article class="content-card">
                <div class="section-heading">
                  <h3>广告文案</h3>
                  <button class="mini-copy" type="button" data-copy-target="adCopy" aria-label="复制广告文案">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M8 8h10v12H8z" />
                      <path d="M6 16H4V4h10v2" />
                    </svg>
                  </button>
                </div>
                <div id="adCopy" class="copy-block"></div>
              </article>
              <article class="content-card">
                <div class="section-heading">
                  <h3>邮件文案</h3>
                  <button class="mini-copy" type="button" data-copy-target="emailCopy" aria-label="复制邮件文案">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M8 8h10v12H8z" />
                      <path d="M6 16H4V4h10v2" />
                    </svg>
                  </button>
                </div>
                <div id="emailCopy" class="copy-block"></div>
              </article>
            </div>
          </div>

          <div id="calendar" class="tab-panel">
            <div id="calendarGrid" class="calendar-grid"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite">已复制</div>
    <script src="./app.js"></script>
  </body>
</html>
